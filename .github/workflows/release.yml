name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Publish .NET server (self-contained)
        run: >
          dotnet publish src/Uia.Server/Uia.Server.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=false
          -p:PublishReadyToRun=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o publish/release

      - name: Build Go CLI
        working-directory: cli
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: amd64
        run: go build -ldflags "-s -w" -o ../publish/release/uia.exe .

      - name: Create release zip
        shell: pwsh
        run: |
          Compress-Archive -Path publish/release/* -DestinationPath "uiacli-${{ github.ref_name }}-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: UIA CLI ${{ github.ref_name }}
          generate_release_notes: true
          files: uiacli-${{ github.ref_name }}-win-x64.zip
          body: |
            ## Installation

            1. Download `uiacli-${{ github.ref_name }}-win-x64.zip`
            2. Extract to a folder (e.g., `C:\Tools\uiacli`)
            3. Add that folder to your `PATH`
            4. Run `uia windows` to verify

            **No .NET SDK or Go toolchain required** — this is a self-contained build.

            ## What's inside

            - `uia.exe` — CLI client
            - `Uia.Server.exe` — automation server (auto-started by the CLI)
            - All .NET dependencies bundled
